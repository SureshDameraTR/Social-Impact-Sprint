[project]
name = "pashuraksha-api"
version = "0.1.0"
description = "PashuRaksha ERP - FastAPI Backend"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pydantic-settings>=2.2.0",
    "PyJWT>=2.8.0",
    "python-multipart>=0.0.9",
    "httpx>=0.27.0",
    "bcrypt>=4.0.0",
    "tenacity>=8.2.0",
    "circuitbreaker>=2.0.0",
    "slowapi>=0.1.9",
    "cachetools>=5.3.0",
    "aiobotocore>=2.13.0",
    "beautifulsoup4>=4.12.0",
    "pdfplumber>=0.11.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (common pitfalls)
    "PT",  # flake8-pytest-style
    "UP",  # pyupgrade (modern Python idioms)
    "N",   # pep8-naming
]
ignore = [
    "B008",  # Depends() in default args is standard FastAPI pattern
]
per-file-ignores = { "app/seed/demo_data.py" = ["E501"], "app/services/disease_rules.py" = ["E501"], "tests/test_browser_walkthrough.py" = ["E501"] }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
addopts = "--strict-markers --tb=short"
markers = ["integration: marks tests as integration tests requiring real PostgreSQL"]

[dependency-groups]
dev = [
    "playwright>=1.58.0",
]
