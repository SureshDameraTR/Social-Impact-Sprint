services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pashuraksha
      POSTGRES_USER: pashu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pashu -d pashuraksha"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  mock-backends:
    build: ./mocks
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./mocks/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: ./packages/api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./packages/api/app:/app/app
      - ./packages/api/alembic:/app/alembic
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:8081}
      AADHAAR_HASH_SECRET: ${AADHAAR_HASH_SECRET:-}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      WEATHER_API_URL: ${WEATHER_API_URL:-http://mock-backends:8001/api/weather}
      BHARAT_PASHUDHAN_API_URL: ${BHARAT_PASHUDHAN_API_URL:-http://mock-backends:8001/api/registry}
      IOT_GATEWAY_URL: ${IOT_GATEWAY_URL:-http://mock-backends:8001/api/iot}
      STORAGE_API_URL: ${STORAGE_API_URL:-http://mock-backends:8001/api/storage}
    depends_on:
      db:
        condition: service_healthy
      mock-backends:
        condition: service_healthy
    command: >
      sh -c "if [ \"$ENVIRONMENT\" = 'development' ]; then
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4;
      fi"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  admin:
    build:
      context: ./packages/admin
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - frontend

  collection:
    build:
      context: ./packages/collection
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - frontend

  vet:
    build:
      context: ./packages/vet
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - frontend

volumes:
  pgdata:
