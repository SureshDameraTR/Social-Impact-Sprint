services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pashuraksha
      POSTGRES_USER: pashu
      POSTGRES_PASSWORD: pashu_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pashu -d pashuraksha"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./packages/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pashu:pashu_dev_2026@db:5432/pashuraksha
      JWT_SECRET: dev-secret-change-in-production
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./packages/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
