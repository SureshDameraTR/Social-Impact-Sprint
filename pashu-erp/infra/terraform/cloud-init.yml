#cloud-config

package_update: true
package_upgrade: true
packages:
  - docker.io
  - docker-compose-v2
  - curl
  - unzip
  - jq

groups:
  - docker
users:
  - default

runcmd:
  # Docker
  - usermod -aG docker ubuntu
  - systemctl enable docker
  - systemctl start docker

  # Caddy
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy.gpg
  - echo 'deb [signed-by=/usr/share/keyrings/caddy.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main' > /etc/apt/sources.list.d/caddy.list
  - apt-get update
  - apt-get install -y caddy

  # Node.js 22 (build-time only)
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - npm install -g pnpm

  # AWS CLI v2
  - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
  - unzip -q /tmp/awscliv2.zip -d /tmp
  - /tmp/aws/install
  - rm -rf /tmp/aws /tmp/awscliv2.zip

  # Directories
  - mkdir -p /opt/pashuraksha
  - mkdir -p /var/www/{admin,collection,vet}
  - mkdir -p /var/log/caddy
  - chown -R ubuntu:ubuntu /opt/pashuraksha /var/www

  # Clone repo
  - su - ubuntu -c "git clone ${github_repo} /opt/pashuraksha/repo"

  # Write .env
  - |
    cat > /opt/pashuraksha/repo/pashu-erp/.env <<ENVEOF
    POSTGRES_PASSWORD=${db_password}
    DATABASE_URL=postgresql+asyncpg://pashu:${db_password}@db:5432/pashuraksha
    JWT_SECRET=${jwt_secret}
    ENVIRONMENT=production
    CORS_ORIGINS=https://${subdomain_prefix}admin.${domain},https://${subdomain_prefix}collect.${domain},https://${subdomain_prefix}vet.${domain}
    WEATHER_API_URL=http://mock-backends:8001/api/weather
    BHARAT_PASHUDHAN_API_URL=http://mock-backends:8001/api/registry
    IOT_GATEWAY_URL=http://mock-backends:8001/api/iot
    STORAGE_API_URL=http://mock-backends:8001/api/storage
    ENVEOF
  - chmod 600 /opt/pashuraksha/repo/pashu-erp/.env
  - chown ubuntu:ubuntu /opt/pashuraksha/repo/pashu-erp/.env

  # Build admin (standalone → .next/standalone/)
  - su - ubuntu -c "cd /opt/pashuraksha/repo/pashu-erp/packages/admin && pnpm install && NEXT_PUBLIC_API_URL=https://${subdomain_prefix}api.${domain} npx next build"
  - cp -r /opt/pashuraksha/repo/pashu-erp/packages/admin/.next/static /opt/pashuraksha/repo/pashu-erp/packages/admin/.next/standalone/.next/static
  - cp -r /opt/pashuraksha/repo/pashu-erp/packages/admin/public /opt/pashuraksha/repo/pashu-erp/packages/admin/.next/standalone/public 2>/dev/null || true

  # Build collection centre (Vite → dist/)
  - su - ubuntu -c "cd /opt/pashuraksha/repo/pashu-erp/packages/collection && pnpm install && VITE_API_URL=https://${subdomain_prefix}api.${domain} npx vite build"
  - cp -r /opt/pashuraksha/repo/pashu-erp/packages/collection/dist/* /var/www/collection/

  # Build vet portal (Vite → dist/)
  - su - ubuntu -c "cd /opt/pashuraksha/repo/pashu-erp/packages/vet && pnpm install && VITE_API_URL=https://${subdomain_prefix}api.${domain} npx vite build"
  - cp -r /opt/pashuraksha/repo/pashu-erp/packages/vet/dist/* /var/www/vet/

  # Add swap (t3.micro has only 1GB RAM)
  - fallocate -l 1G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab

  # Start backend containers
  - su - ubuntu -c "cd /opt/pashuraksha/repo/pashu-erp && docker compose up -d db mock-backends api"

  # Wait for DB health + run migrations
  - sleep 20
  - su - ubuntu -c "cd /opt/pashuraksha/repo/pashu-erp && docker compose exec -T api python -m alembic upgrade head"

  # Admin standalone server (systemd)
  - |
    cat > /etc/systemd/system/pashuraksha-admin.service <<SVCEOF
    [Unit]
    Description=PashuRaksha Admin (Next.js standalone)
    After=network.target

    [Service]
    Type=simple
    User=ubuntu
    WorkingDirectory=/opt/pashuraksha/repo/pashu-erp/packages/admin/.next/standalone
    Environment=PORT=3000
    Environment=HOSTNAME=127.0.0.1
    Environment=NEXT_PUBLIC_API_URL=https://${subdomain_prefix}api.${domain}
    ExecStart=/usr/bin/node server.js
    Restart=always
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    SVCEOF
  - systemctl daemon-reload
  - systemctl enable pashuraksha-admin
  - systemctl start pashuraksha-admin

  # Caddyfile
  - |
    cat > /etc/caddy/Caddyfile <<CADDYEOF
    ${subdomain_prefix}api.${domain} {
        reverse_proxy localhost:8000
        header {
            X-Content-Type-Options nosniff
            X-Frame-Options DENY
            Referrer-Policy strict-origin-when-cross-origin
            -Server
        }
        log {
            output file /var/log/caddy/api.log
            format json
        }
    }

    ${subdomain_prefix}admin.${domain} {
        reverse_proxy localhost:3000
        header {
            X-Content-Type-Options nosniff
            X-Frame-Options DENY
            Referrer-Policy strict-origin-when-cross-origin
            Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()"
            Cross-Origin-Opener-Policy same-origin
            -Server
        }
        log {
            output file /var/log/caddy/admin.log
            format json
        }
    }

    ${subdomain_prefix}collect.${domain} {
        root * /var/www/collection
        file_server
        try_files {path} /index.html
        header {
            Cache-Control "public, max-age=3600"
            X-Content-Type-Options nosniff
            X-Frame-Options DENY
            Referrer-Policy strict-origin-when-cross-origin
            Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()"
            Cross-Origin-Opener-Policy same-origin
            Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://${subdomain_prefix}api.${domain}; frame-ancestors 'none'"
            -Server
        }
        log {
            output file /var/log/caddy/collection.log
            format json
        }
    }

    ${subdomain_prefix}vet.${domain} {
        root * /var/www/vet
        file_server
        try_files {path} /index.html
        header {
            Cache-Control "public, max-age=3600"
            X-Content-Type-Options nosniff
            X-Frame-Options DENY
            Referrer-Policy strict-origin-when-cross-origin
            Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()"
            Cross-Origin-Opener-Policy same-origin
            Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self'; connect-src 'self' https://${subdomain_prefix}api.${domain}; frame-ancestors 'none'"
            -Server
        }
        log {
            output file /var/log/caddy/vet.log
            format json
        }
    }

    ${domain} {
        redir https://${subdomain_prefix}admin.${domain}{uri} permanent
    }

    www.${domain} {
        redir https://${subdomain_prefix}admin.${domain}{uri} permanent
    }
    CADDYEOF
  - systemctl restart caddy
  - systemctl enable caddy

  # Backup script
  - |
    cat > /opt/pashuraksha/backup.sh <<'BACKUPEOF'
    #!/bin/bash
    set -euo pipefail
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_DIR="/tmp/db-backups"
    S3_BUCKET="${backup_bucket}"
    mkdir -p "$BACKUP_DIR"
    docker exec pashu-erp-db-1 pg_dump -U pashu -d pashuraksha --format=custom --compress=9 > "$BACKUP_DIR/pashuraksha_$TIMESTAMP.dump"
    aws s3 cp "$BACKUP_DIR/pashuraksha_$TIMESTAMP.dump" "s3://$S3_BUCKET/daily/pashuraksha_$TIMESTAMP.dump"
    rm -f "$BACKUP_DIR/pashuraksha_$TIMESTAMP.dump"
    echo "[$(date)] Backup uploaded: s3://$S3_BUCKET/daily/pashuraksha_$TIMESTAMP.dump"
    BACKUPEOF
  - chmod +x /opt/pashuraksha/backup.sh
  - chown ubuntu:ubuntu /opt/pashuraksha/backup.sh

  # Daily backup cron — 2:30 AM IST = 21:00 UTC
  - echo "0 21 * * * ubuntu /opt/pashuraksha/backup.sh >> /var/log/backup.log 2>&1" > /etc/cron.d/db-backup
  - chmod 644 /etc/cron.d/db-backup

  # Deploy script for future code updates
  - |
    cat > /opt/pashuraksha/deploy.sh <<'DEPLOYEOF'
    #!/bin/bash
    set -euo pipefail
    REPO_DIR="/opt/pashuraksha/repo"
    API_URL="https://${subdomain_prefix}api.${domain}"
    echo "=== Pulling latest code ==="
    cd "$REPO_DIR" && git pull origin main
    echo "=== Rebuilding admin ==="
    cd "$REPO_DIR/pashu-erp/packages/admin"
    pnpm install --frozen-lockfile
    NEXT_PUBLIC_API_URL=$API_URL npx next build
    cp -r .next/static .next/standalone/.next/static
    cp -r public .next/standalone/public 2>/dev/null || true
    sudo systemctl restart pashuraksha-admin
    echo "=== Rebuilding collection ==="
    cd "$REPO_DIR/pashu-erp/packages/collection"
    pnpm install --frozen-lockfile
    VITE_API_URL=$API_URL npx vite build
    cp -r dist/* /var/www/collection/
    echo "=== Rebuilding vet ==="
    cd "$REPO_DIR/pashu-erp/packages/vet"
    pnpm install --frozen-lockfile
    VITE_API_URL=$API_URL npx vite build
    cp -r dist/* /var/www/vet/
    echo "=== Rebuilding API container ==="
    cd "$REPO_DIR/pashu-erp"
    docker compose up -d --build api
    echo "=== Running migrations ==="
    docker compose exec -T api alembic upgrade head
    echo "=== Done ==="
    echo "Verify: curl -s https://${subdomain_prefix}api.${domain}/health | jq"
    DEPLOYEOF
  - chmod +x /opt/pashuraksha/deploy.sh
  - chown ubuntu:ubuntu /opt/pashuraksha/deploy.sh
