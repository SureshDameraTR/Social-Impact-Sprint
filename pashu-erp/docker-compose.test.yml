services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pashuraksha_test
      POSTGRES_USER: pashu_test
      POSTGRES_PASSWORD: test_password
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pashu_test -d pashuraksha_test"]
      interval: 2s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
